name: Availability Monitor

on:
  schedule:
    - cron: "0 * * * *"   # every hour (UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: monitor/state.json
          key: availability-monitor-state
          restore-keys: availability-monitor-state

      - name: Run availability check (email notify)
        env:
          # API (cookie + CSRF)
          AVAILABILITY_API_URL: ${{ secrets.AVAILABILITY_API_URL }}
          AVAILABILITY_COOKIE: ${{ secrets.AVAILABILITY_COOKIE }}
          AVAILABILITY_CSRF: ${{ secrets.AVAILABILITY_CSRF }}
          AVAILABILITY_REFERER: ${{ secrets.AVAILABILITY_REFERER }}
          AVAILABILITY_USER_AGENT: ${{ secrets.AVAILABILITY_USER_AGENT }}

          # Email (Gmail app password)
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

          # Thresholds / TZ
          WARN_THRESHOLD_PCT: "99"
          CRIT_THRESHOLD_PCT: "100"
          LOCAL_TZ: "Europe/Prague"
        run: |
          python monitor/availability_check.py
