name: forecast

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if not in the 05:00-08:00 Prague window"
        required: false
        default: "true"
  schedule:
    # GitHub cron is UTC; Prague is UTC+1 in winter and UTC+2 in summer.
    # 04:07 UTC = 06:07 CEST / 05:07 CET.
    # 05:07 UTC = 07:07 CEST / 06:07 CET.
    # Both are inside the 05:00-08:00 Prague window and avoid the top-of-hour queue.
    - cron: "7 4,5 * * *"

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Europe/Prague
      SOLAX_BASE_URL: ${{ secrets.SOLAX_BASE_URL }}
      SOLAX_TOKEN_ID: ${{ secrets.SOLAX_TOKEN_ID }}
      SOLAX_WIFI_SN: ${{ secrets.SOLAX_WIFI_SN }}
      AVAILABILITY_API_URL: ${{ secrets.AVAILABILITY_API_URL }}
      AVAILABILITY_COOKIE: ${{ secrets.AVAILABILITY_COOKIE }}
      AVAILABILITY_CSRF: ${{ secrets.AVAILABILITY_CSRF }}
      AVAILABILITY_REFERER: ${{ secrets.AVAILABILITY_REFERER }}
      AVAILABILITY_USER_AGENT: ${{ secrets.AVAILABILITY_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast (05:00-08:00 Prague)
        shell: bash
        run: |
          echo "Local time (Prague): $(date)"
          FORCE="${{ github.event.inputs.force }}"
          echo "Force mode: ${FORCE:-false}"

          if [ "${FORCE:-false}" != "true" ]; then
            H=$(date +%H)
            # allow 05,06,07,08 Prague time
            if [ "$H" != "05" ] && [ "$H" != "06" ] && [ "$H" != "07" ] && [ "$H" != "08" ]; then
              echo "Not within 05:00-08:59 Europe/Prague, skipping."
              exit 0
            fi
          fi

          python -u pv_forecast.py

      - name: Validate saved forecast outputs
        shell: bash
        run: |
          TODAY="$(date +%F)"
          python -u scripts/validate_forecast_outputs.py \
            --date "$TODAY" \
            --summary forecasts/forecast_daily_summary.csv \
            --intraday-dir forecasts/intraday

      - name: Upload forecast debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            forecasts/switch_trace/
            forecast_outputs/
            forecast_plots/

      - name: Commit outputs (daily summary + intraday)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add forecasts/forecast_daily_summary.csv || true
          git add forecasts/intraday || true

          git status --porcelain

          if git diff --cached --quiet; then
            echo "Forecast outputs already up to date; no commit needed."
            exit 0
          fi

          git commit -m "Update forecast outputs"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "Push failed; retrying after remote refresh ($attempt/3)."
            sleep 5
          done

          echo "Unable to push forecast outputs after retries."
          exit 1
